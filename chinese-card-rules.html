<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Card Game Rules - Andert den Besten</title>

    <style>
        @import url(https://rsms.me/inter/inter.css);

        :root {
            --alpha-value: .85;
            --color-dark: #000000;
            --color-primary-light: #fdfff0;
            --color-primary-light-fade: rgb(253, 255, 240, var(--alpha-value));
            --color-primary: #2f7444;
            --color-primary-fade: rgb(47, 116, 68, var(--alpha-value));
            --color-primary-dark: #13302c;
            font-size: 16px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            background: var(--color-primary-light);
            color: var(--color-primary-dark);
            font-family: "Inter", sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        @media (prefers-color-scheme: dark) {
            html {
                background: var(--color-primary-dark);
                color: var(--color-primary-light);
            }
        }

        body {
            margin: 0;
        }

        main {
            max-width: 48rem;
            margin: 0 auto;
            padding: 3rem 1.25rem 5rem;
        }

        h1 {
            font-size: clamp(2.25rem, calc(4 / 60 * 100vw), 3.5rem);
            font-weight: 800;
            line-height: 1.2;
            margin: 0 0 1rem;
        }

        h2 {
            font-size: clamp(1.4rem, calc(2 / 60 * 100vw), 1.85rem);
            font-weight: 600;
            line-height: 1.3;
            margin: 2.5rem 0 .75rem;
        }

        h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 1.75rem 0 .5rem;
        }

        p,
        li {
            font-size: 1.05rem;
        }

        ul,
        ol {
            padding-left: 1.5rem;
        }

        li {
            margin-bottom: .4rem;
        }

        a {
            color: var(--color-primary);
            text-decoration: none;
            transition: .22s ease;
        }

        @media (prefers-color-scheme: dark) {
            a {
                color: #70c9d9;
            }
        }

        a:hover {
            text-decoration: underline;
        }

        .lead {
            font-size: 1.2rem;
            opacity: .85;
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>
    <main>
        <h1>Chinese Card Game Rules</h1>
        <p class="lead">Rules and how to play. Content coming soon.</p>
    </main>
</body>

</html>
