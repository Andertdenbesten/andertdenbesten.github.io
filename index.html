<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Designer, Frontend Developer - Andert den Besten</title>

    <style>
        @import url(https://rsms.me/inter/inter.css);

        :root {
            --bg: #ece7dc;
            --ink: #1d2530;
            font-size: 16px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #15171c;
                --ink: #ece7dc;
            }
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            min-height: 100vh;
            background-color: var(--bg);
            color: var(--ink);
            font-family: "Inter", sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(1rem, 4vw, 2.5rem);
        }

        /* Hand-composed "tossed deck" backdrop — oversized card suits and
           question marks scattered behind the tiles like a game table. */
        .backdrop {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .backdrop text {
            font-family: "Inter", sans-serif;
            font-weight: 900;
        }

        .backdrop .ink {
            fill: var(--ink);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Visually hidden, but kept for SEO + screen readers */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* ---- Tile menu ---------------------------------------------------- */

        .tiles {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: clamp(1rem, 3vw, 2.25rem);
            width: 100%;
            max-width: 46rem;
        }

        @media (max-width: 560px) {
            .tiles {
                grid-template-columns: 1fr;
                max-width: 23rem;
            }
        }

        /* Shared silhouette — both tiles are identical in shape, radius,
           the chunky 3D bottom-lip, and the press-down interaction. Only
           the colours / texture change per destination. */
        .tile {
            --lip: 10px;
            position: relative;
            isolation: isolate;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            aspect-ratio: 4 / 5;
            padding: clamp(1.1rem, 4%, 1.75rem);
            border-radius: 24px;
            color: var(--tile-ink);
            background: var(--tile-bg);
            box-shadow:
                0 var(--lip) 0 0 var(--tile-lip),
                0 calc(var(--lip) + 14px) 30px -12px rgba(0, 0, 0, .45);
            transform: translateY(0);
            transition: transform .16s ease, box-shadow .16s ease;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
        }

        .tile:hover {
            transform: translateY(-3px);
            box-shadow:
                0 calc(var(--lip) + 3px) 0 0 var(--tile-lip),
                0 calc(var(--lip) + 20px) 38px -12px rgba(0, 0, 0, .5);
        }

        .tile:active {
            transform: translateY(var(--lip));
            box-shadow:
                0 0 0 0 var(--tile-lip),
                0 6px 14px -8px rgba(0, 0, 0, .5);
        }

        /* Big, faded white duotone icon watermark behind the type.
           The two tones come from per-shape opacities on the same white. */
        .tile__icon {
            position: absolute;
            top: 3%;
            right: -9%;
            width: 76%;
            height: auto;
            color: #ffffff;
            z-index: 0;
            pointer-events: none;
            transform: rotate(var(--icon-rot, 0deg));
            transform-origin: center;
            transition: transform .35s cubic-bezier(.34, 1.56, .64, 1);
        }

        /* lone "?" mark — single tone (no duotone) */
        .tile__icon .icon-mark {
            opacity: .2;
        }

        /* card deck — two tints of white for a duotone look */
        .tile__icon .duo-bg {
            opacity: .14;
        }

        .tile__icon .duo-fg {
            opacity: .3;
        }

        .tile:hover .tile__icon {
            transform: rotate(calc(var(--icon-rot, 0deg) - 8deg)) scale(1.07);
        }

        /* Typography is the hero graphic — huge, heavy, edge-to-edge.
           Sits above the faded icon watermark. */
        .tile__text {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
        }

        .tile__sub {
            margin-bottom: .5rem;
            font-size: clamp(.72rem, 1.9vw, .85rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .18em;
            opacity: .7;
        }

        .tile__title {
            font-size: clamp(3.4rem, 14vw, 5.6rem);
            font-weight: 900;
            line-height: .82;
            letter-spacing: -.045em;
            text-transform: uppercase;
        }

        /* "CHINESE" is a long word — size it so it stays on the card */
        .tile--cc .tile__title {
            font-size: clamp(2.9rem, 11vw, 4.4rem);
        }

        /* Decorative per-destination background sits behind the content */
        .tile::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -1;
        }

        /* --- Guess Who : amber sunburst --- */
        .tile--gw {
            --tile-bg: #F59E1A;
            --tile-lip: #B0670F;
            --tile-ink: #2C3842;
            --icon-rot: -13deg;
        }

        .tile--gw::before {
            background: repeating-conic-gradient(from 0deg at 50% 32%,
                    #F59E1A 0deg 15deg, #F7AC44 15deg 30deg);
            -webkit-mask: radial-gradient(circle at 50% 32%, #000 0%, #000 26%, transparent 68%);
            mask: radial-gradient(circle at 50% 32%, #000 0%, #000 26%, transparent 68%);
            opacity: .9;
        }

        /* --- Chinese Cards : red playing-card + parchment glow --- */
        .tile--cc {
            --tile-bg: #C43820;
            --tile-lip: #7C2012;
            --tile-ink: #F8EAD0;
            --icon-rot: 10deg;
        }

        .tile--cc::before {
            background:
                radial-gradient(circle at 50% 36%, rgba(248, 234, 208, .22), rgba(248, 234, 208, 0) 58%),
                repeating-linear-gradient(45deg, rgba(0, 0, 0, .05) 0 7px, transparent 7px 14px);
        }

        /* Shorter, landscape-ish tiles when stacked so both fit on screen.
           Placed after the base .tile rule so it wins the cascade. */
        @media (max-width: 560px) {
            .tile {
                aspect-ratio: 16 / 10;
            }
        }
    </style>
</head>

<body>
    <svg class="backdrop" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
        <g text-anchor="middle" dominant-baseline="central">
            <text x="95" y="150" font-size="125" transform="rotate(-16 95 150)" fill="#C43820" fill-opacity=".11">♥</text>
            <text x="250" y="470" font-size="155" transform="rotate(13 250 470)" fill="#F59E1A" fill-opacity=".16">?</text>
            <text x="135" y="690" font-size="105" transform="rotate(-7 135 690)" class="ink" fill-opacity=".07">♣</text>
            <text x="470" y="105" font-size="80" transform="rotate(12 470 105)" fill="#F59E1A" fill-opacity=".13">♦</text>
            <text x="730" y="135" font-size="70" transform="rotate(-9 730 135)" class="ink" fill-opacity=".07">♠</text>
            <text x="640" y="715" font-size="95" transform="rotate(-11 640 715)" fill="#C43820" fill-opacity=".1">♥</text>
            <text x="1095" y="120" font-size="105" transform="rotate(15 1095 120)" class="ink" fill-opacity=".07">♠</text>
            <text x="1060" y="455" font-size="165" transform="rotate(-14 1060 455)" fill="#F59E1A" fill-opacity=".15">?</text>
            <text x="1110" y="700" font-size="120" transform="rotate(9 1110 700)" fill="#C43820" fill-opacity=".11">♦</text>
        </g>
    </svg>

    <h1 class="sr-only">Andert den Besten — Digital Design</h1>

    <main class="tiles">
        <a class="tile tile--gw" href="guess-who.html">
            <svg class="tile__icon" viewBox="0 0 100 100" fill="currentColor" aria-hidden="true">
                <text class="icon-mark" x="50" y="52" text-anchor="middle" dominant-baseline="central"
                    font-family="Inter, sans-serif" font-weight="900" font-size="104">?</text>
            </svg>
            <span class="tile__text">
                <span class="tile__sub">Language practice</span>
                <span class="tile__title">Guess Who</span>
            </span>
        </a>
        <a class="tile tile--cc" href="chinese-card-rules.html">
            <svg class="tile__icon" viewBox="0 0 100 100" fill="currentColor" aria-hidden="true">
                <rect class="duo-bg" x="14" y="26" width="44" height="62" rx="7" transform="rotate(-13 36 57)" />
                <rect class="duo-fg" x="42" y="26" width="44" height="62" rx="7" transform="rotate(13 64 57)" />
            </svg>
            <span class="tile__text">
                <span class="tile__sub">Game rules</span>
                <span class="tile__title">Chinese Cards</span>
            </span>
        </a>
    </main>

</body>

</html>
